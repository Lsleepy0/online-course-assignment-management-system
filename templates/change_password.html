{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><h5 class="mb-0">修改密码</h5></div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                {% if success %}
                <div class="alert alert-success">{{ success }}</div>
                {% endif %}
                <form method="post" action="/auth/change_password">
                    <div class="mb-3">
                        <label class="form-label">旧密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" name="new_password" required maxlength="20">
                        <small class="text-muted">6-20字符</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" name="confirm_new_password" required maxlength="20">
                    </div>
                    <button type="submit" class="btn btn-primary">确认修改</button>
                    <a href="/dashboard" class="btn btn-outline-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
