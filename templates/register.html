<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 在线课程作业管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">用户注册</h4>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="post" action="/auth/register" id="regForm" onsubmit="return checkForm()">
                        <div class="mb-3">
                            <label class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="username" required maxlength="20">
                            <small class="text-muted">1-20字符</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="password" id="password" required maxlength="20">
                            <small class="text-muted">6-20字符，需包含字母和数字</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="confirm_password" id="confirm_password" required maxlength="20">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色 <span class="text-danger">*</span></label>
                            <select class="form-select" name="role" id="role" onchange="toggleClass()">
                                <option value="admin">管理员</option>
                                <option value="teacher">教师</option>
                                <option value="student" selected>学生</option>
                            </select>
                        </div>
                        <div class="mb-3" id="classDiv">
                            <label class="form-label">所属班级 <span class="text-danger">*</span></label>
                            <select class="form-select" name="class_id" id="class_id">
                                <option value="">请选择班级</option>
                                {% for c in classes %}
                                <option value="{{ c.id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">注册</button>
                            <a href="/auth/login" class="btn btn-outline-secondary">返回登录</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function toggleClass(){
    var role = document.getElementById('role').value;
    var div = document.getElementById('classDiv');
    if(role == 'student'){
        div.style.display = 'block';
    } else {
        div.style.display = 'none';
        document.getElementById('class_id').value = '';
    }
}
function checkForm(){
    var p1 = document.getElementById('password').value;
    var p2 = document.getElementById('confirm_password').value;
    if(p1 != p2){
        alert('两次密码不一致');
    }
    return true;
}
toggleClass();
</script>
</body>
</html>
