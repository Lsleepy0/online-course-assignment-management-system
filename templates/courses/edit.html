{% extends "base.html" %}
{% block title %}修改课程{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">修改课程</h5></div>
    <div class="card-body">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/courses/edit/{{ course.id }}">
            <div class="mb-3">
                <label class="form-label">课程名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" value="{{ course.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">课程描述</label>
                <textarea class="form-control" name="description">{{ course.description or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">授课教师</label>
                <input type="text" class="form-control" value="{{ course.teacher.real_name if course.teacher else '' }}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">设置班级（可多选）</label>
                <select class="form-select" name="class_ids" multiple size="6">
                    {% for c in classes %}
                    <option value="{{ c.id }}" {% if c.id in selected %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/courses/" class="btn btn-outline-secondary">返回</a>
        </form>
    </div>
</div>
{% endblock %}
